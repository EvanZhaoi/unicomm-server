server:
  port: 28080

spring:
  application:
    name: unicomm-server

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-mysql.sql
      encoding: UTF-8

  # Redis 配置（后续需要集中缓存或会话存储时启用）
  # redis:
  #   host: localhost
  #   port: 6379
  #   password: your_password
  #   database: 0

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# SpringDoc OpenAPI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

unicomm:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${UNICOMM_DB_URL:jdbc:mysql://localhost:3306/unicomm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${UNICOMM_DB_USERNAME:root}
    password: ${UNICOMM_DB_PASSWORD:}

# Sa-Token 配置
sa-token:
  # Token 名称 (同时也是 Cookie 名称)
  token-name: unicomm-token
  # Token 有效期 (秒)
  timeout: 259200
  # Token 活跃时间 (秒, 活跃期间无操作则过期)
  active-timeout: 1800
  # 是否允许同一账号并发登录
  concurrent: false
  # 是否有其他人挤下线时踢人
  is-concurrent: false
  # 是否在多端登录时共享 Token
  is-share: false
  # 是否输出操作日志
  is-log: false
