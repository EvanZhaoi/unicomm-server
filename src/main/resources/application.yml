server:
  port: 28080

spring:
  application:
    name: unicomm-server

  # MySQL 配置 (Phase 1 使用内存模拟，生产环境取消注释)
  # datasource:
  #   url: jdbc:mysql://localhost:3306/unicomm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
  #   username: root
  #   password: your_password
  #   driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置 (Phase 1 使用内存模拟，生产环境取消注释)
  # redis:
  #   host: localhost
  #   port: 6379
  #   password: your_password
  #   database: 0

  # Sa-Token 配置
  sa-token:
    # Token 名称 (同时也是 Cookie 名称)
    token-name: unicomm-token
    # Token 有效期 (秒)
    timeout: 259200
    # Token 活跃时间 (秒, 活跃期间无操作则过期)
    active-timeout: 1800
    # 是否允许同一账号并发登录
    concurrent: false
    # 是否有其他人挤下线时踢人
    is-concurrent: false
    # 是否在多端登录时共享 Token
    is-share: false
    # 是否输出操作日志
    is-log: false

  # SpringDoc OpenAPI
  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true
      path: /swagger-ui.html
      tags-sorter: alpha
      operations-sorter: alpha

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.unicomm.module.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 通用配置
unicomm:
  # 数据初始化模式 (dev=内存初始化, prod=数据库)
  data-mode: dev
